---
deployment:
  tasks:
    - export DEPLOYPATH=/home/thelivin/new-app
    - /bin/rsync -a --delete --exclude='.git' --exclude='node_modules' --exclude='.cpanel.yml' --exclude='.env' "$PWD"/ "$DEPLOYPATH"/
    - cd "$DEPLOYPATH" && npm ci
    - cd "$DEPLOYPATH" && npm run build
    - cd "$DEPLOYPATH" && npm prune --omit=dev
